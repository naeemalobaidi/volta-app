services:
  - type: web
    name: volta-api
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt "pydantic[email]"
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --app-dir backend
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///./volta.db
